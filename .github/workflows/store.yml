# Builds the Microsoft Store MSIX bundle via tauri-windows-bundle.
#
# Kept separate from release.yml on purpose: that workflow ships the
# (SignPath/Authenticode-signed) MSI + NSIS installers to GitHub Releases;
# this one produces the .msixbundle for manual upload to Partner Center,
# which the Store re-signs. Different toolchain, different output dir
# (src-tauri/target/msix/ vs src-tauri/target/release/bundle/) — no collision.
#
# Manual trigger only: a Store-submittable package needs the real Partner
# Center identity filled into src-tauri/gen/windows/bundle.config.json and
# AppxManifest.xml.template. Run this when a Store submission is due.
name: MSIX (Microsoft Store)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  msix:
    name: Build MSIX bundle
    runs-on: windows-latest
    # Skip prerelease tags (e.g. v0.5.0-rc1); a manual dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    # Surfaced as an env var so the publish steps below can gate on whether
    # the Partner Center / Entra credentials have been configured yet.
    env:
      AZURE_AD_TENANT_ID: ${{ secrets.AZURE_AD_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install Rust (stable, x64 + arm64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Cache cargo workspace
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # cargo build (the bundler's default runner) does not run Tauri's
      # beforeBuildCommand, so the frontend must be built into dist/
      # explicitly before the Rust binary is compiled and packed.
      - name: Build frontend
        run: pnpm build

      - name: Install msixbundle-cli
        run: cargo install msixbundle-cli

      - name: Build MSIX bundle (x64 + arm64)
        run: pnpm tauri:windows:build --arch x64,arm64 --runner pnpm --verbose

      - name: Upload MSIX bundle
        uses: actions/upload-artifact@v4
        with:
          name: gitwink-msix
          path: src-tauri/target/msix/*.msixbundle
          if-no-files-found: error

      # Auto-submit to the Microsoft Store via the Dev Store CLI (msstore).
      #
      # DISABLED by default: gated on the `STORE_AUTOPUBLISH` repo *variable*
      # being "true", which it is NOT today. Reason: the Entra app that msstore
      # authenticates with is not yet associated to the Partner Center account
      # (Azure app registration != Partner Center "Microsoft Entra applications"
      # association), so `msstore reconfigure` fails and turns every run red —
      # even though the MSIX build + artifact upload above succeed. Until that's
      # set up, Store submission is done via tools/deploy-store.ps1 (it grabs the
      # exact artifact built above for a manual Partner Center upload). To
      # re-enable once the Entra app is connected with a Manager role:
      #   gh variable set STORE_AUTOPUBLISH --repo var-gg/gitwink --body true
      # The env.AZURE_AD_TENANT_ID guard also stays so forks without the secrets
      # never run it. Store-update via GitHub Actions is free-product-only —
      # gitwink is free. Product id 9P0S21GJD53F.
      - name: Configure Microsoft Store CLI
        if: ${{ vars.STORE_AUTOPUBLISH == 'true' && env.AZURE_AD_TENANT_ID != '' }}
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Authenticate to Partner Center
        if: ${{ vars.STORE_AUTOPUBLISH == 'true' && env.AZURE_AD_TENANT_ID != '' }}
        run: >-
          msstore reconfigure
          --tenantId ${{ secrets.AZURE_AD_TENANT_ID }}
          --sellerId ${{ secrets.SELLER_ID }}
          --clientId ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          --clientSecret ${{ secrets.AZURE_AD_APPLICATION_SECRET }}

      - name: Publish msixbundle to the Microsoft Store
        if: ${{ vars.STORE_AUTOPUBLISH == 'true' && env.AZURE_AD_TENANT_ID != '' }}
        shell: pwsh
        run: |
          $pkg = (Get-ChildItem src-tauri/target/msix/*.msixbundle | Select-Object -First 1).FullName
          Write-Output "Publishing $pkg to Store product 9P0S21GJD53F"
          msstore publish "$pkg" -id 9P0S21GJD53F
